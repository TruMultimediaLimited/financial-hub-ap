<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financial Hub v11.4</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{min-height:100vh;background:#060d1a;color:#e2e8f0;font-family:'Inter',sans-serif}
    .glass{background:rgba(15,23,42,0.85);border:1px solid rgba(51,65,85,0.5)}
    .gem{background:rgba(6,78,59,0.18);border:1px solid rgba(16,185,129,0.22)}
    input,select,textarea{background:#0f172a!important;color:#e2e8f0!important;border:1px solid #1e293b!important;border-radius:8px!important;padding:8px 12px!important;font-size:14px;outline:none;width:100%}
    input:focus,select:focus{border-color:#10b981!important}
    .btn-p{background:linear-gradient(135deg,#059669,#10b981);color:#fff;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}
    .btn-s{background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;border-radius:8px;padding:8px 16px;font-size:14px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}
    .btn-d{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px}
    .btn-e{background:rgba(59,130,246,.12);color:#93c5fd;border:1px solid rgba(59,130,246,.25);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px}
    .nav-link{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:#64748b}
    .nav-link.on{background:rgba(16,185,129,.12);color:#10b981}
    .sec{display:none}
    .sec.on{display:block}
    .amount{font-family:monospace}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:10px 12px;font-size:11px;color:#475569;border-bottom:1px solid #0f172a;text-transform:uppercase}
    td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(15,23,42,.8);color:#cbd5e1}
    .modal-bg{position:fixed;inset:0;background:rgba(2,6,20,.82);z-index:1000;display:flex;align-items:center;justify-content:center}
    .modal{background:#0c1526;border:1px solid #1e293b;border-radius:16px;padding:24px;width:100%;max-width:480px}
    .toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:12px 20px;border-radius:10px;font-size:14px;background:rgba(6,50,38,.97);border:1px solid #10b981;color:#6ee7b7}
    .toast.err{background:rgba(60,10,10,.97);border:1px solid #ef4444;color:#fca5a5}
    .prof-btn{padding:8px 16px;border-radius:20px;font-weight:600;cursor:pointer;font-size:13px}
    .prof-btn.active{background:#10b981;color:white}
    .prof-btn.inactive{background:#1e293b;color:#64748b}
  </style>
</head>
<body>

<div id="sidebar" style="position:fixed;left:0;top:0;height:100%;width:232px;background:rgba(6,10,20,.97);border-right:1px solid #0f172a;display:flex;flex-direction:column;padding:20px 14px;gap:4px">
  <div style="margin-bottom:20px">
    <div style="font-size:11px;color:#475569;text-transform:uppercase;font-weight:700;margin-bottom:8px">Profile</div>
    <div style="display:flex;gap:6px">
      <button id="prof-radone" class="prof-btn active">Radone</button>
      <button id="prof-efty" class="prof-btn inactive">Efty</button>
    </div>
  </div>
  <nav id="nav-container" style="display:flex;flex-direction:column;gap:2px"></nav>
</div>

<div id="main" style="margin-left:232px;padding:28px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
    <h1 style="font-size:22px;font-weight:700;color:#f1f5f9">Dashboard</h1>
    <div style="display:flex;gap:10px">
      <select id="month-sel" style="width:auto"></select>
      <button class="btn-s" id="btn-add-inc">+ Income</button>
      <button class="btn-p" id="btn-add-exp">+ Expense</button>
    </div>
  </div>

  <div id="sec-dashboard" class="sec on">
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
      <div class="glass" style="border-radius:14px;padding:20px">
        <div style="font-size:11px;color:#475569;font-weight:600">EARNINGS</div>
        <div class="amount" style="font-size:26px;font-weight:700;color:#34d399;margin-top:8px" id="kpi-inc">৳0</div>
      </div>
      <div class="glass" style="border-radius:14px;padding:20px">
        <div style="font-size:11px;color:#475569;font-weight:600">EXPENSES</div>
        <div class="amount" style="font-size:26px;font-weight:700;color:#f87171;margin-top:8px" id="kpi-exp">৳0</div>
      </div>
      <div class="gem" style="border-radius:14px;padding:20px">
        <div style="font-size:11px;color:#10b981;font-weight:600">SAVINGS</div>
        <div class="amount" style="font-size:26px;font-weight:700;margin-top:8px" id="kpi-sav">৳0</div>
      </div>
    </div>

    <div class="glass" style="border-radius:14px;padding:20px;margin-bottom:20px;background:linear-gradient(135deg, rgba(37,99,235,0.1), rgba(59,130,246,0.05))">
      <div style="font-size:13px;font-weight:600;color:#64748b;margin-bottom:14px">📊 OFFICE FINANCIALS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
        <div>
          <div style="font-size:11px;color:#475569;margin-bottom:6px">Office Income</div>
          <div class="amount" style="font-size:20px;font-weight:700;color:#34d399" id="office-income">৳0</div>
        </div>
        <div>
          <div style="font-size:11px;color:#475569;margin-bottom:6px">Office Expense</div>
          <div class="amount" style="font-size:20px;font-weight:700;color:#f87171" id="office-expense">৳0</div>
        </div>
        <div>
          <div style="font-size:11px;color:#475569;margin-bottom:6px">Net Profit</div>
          <div class="amount" style="font-size:20px;font-weight:700;color:#10b981" id="office-profit">৳0</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="modal" class="modal-bg" style="display:none">
  <div class="modal">
    <div style="display:flex;justify-content:space-between;margin-bottom:20px">
      <h3 style="font-size:16px;font-weight:700" id="modal-title">Add Entry</h3>
      <button id="btn-close-modal" style="color:#475569;background:none;border:none;cursor:pointer;font-size:20px">✕</button>
    </div>
    <div id="form-body" style="display:flex;flex-direction:column;gap:12px"></div>
  </div>
</div>

<div id="toast-wrap"></div>

<script>
(function() {
  const SB_URL = "https://xmjolupznjguiwzcqrko.supabase.co";
  const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhtam9sdXB6bmpndWl3emNxcmtvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNzQzMjIsImV4cCI6MjA5ODc1MDMyMn0.NldrOeKxg63AjTGhRxr9AWfgFcGCLjnu_-itffcU1O4";
  const sb = window.supabase.createClient(SB_URL, SB_KEY);
  
  let currentProfile = 'radone';
  let income = [], expenses = [], cards = [];
  let selMonth = '';

  document.addEventListener('DOMContentLoaded', async () => {
    buildMonthSel();
    setupEvents();
    renderNav();
    await loadData();
  });

  function buildMonthSel() {
    const sel = document.getElementById('month-sel');
    const now = new Date();
    for (let i = 0; i < 12; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const val = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      const o = document.createElement('option');
      o.value = val;
      o.textContent = d.toLocaleString('en', { month:'long', year:'numeric' });
      sel.appendChild(o);
    }
    selMonth = sel.value;
  }

  function setupEvents() {
    document.getElementById('prof-radone').addEventListener('click', () => { currentProfile = 'radone'; updateUI(); });
    document.getElementById('prof-efty').addEventListener('click', () => { currentProfile = 'efty'; updateUI(); });
    document.getElementById('btn-add-inc').addEventListener('click', () => openModal('income'));
    document.getElementById('btn-add-exp').addEventListener('click', () => openModal('expense'));
    document.getElementById('btn-close-modal').addEventListener('click', () => document.getElementById('modal').style.display = 'none');
    document.getElementById('month-sel').addEventListener('change', (e) => { selMonth = e.target.value; updateUI(); });
  }

  function renderNav() {
    document.getElementById('nav-container').innerHTML = `
      <div class="nav-link on" data-sec="dashboard">📊 Dashboard</div>
      <div class="nav-link" data-sec="income">💰 Income</div>
      <div class="nav-link" data-sec="expenses">💸 Expenses</div>
    `;
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('on'));
        document.querySelectorAll('.sec').forEach(s => s.classList.remove('on'));
        link.classList.add('on');
        const sec = link.dataset.sec;
        if (document.getElementById('sec-' + sec)) {
          document.getElementById('sec-' + sec).classList.add('on');
        }
      });
    });
  }

  async function loadData() {
    try {
      const [iRes, eRes] = await Promise.all([
        sb.from('hub_income').select('*'),
        sb.from('hub_expenses').select('*')
      ]);
      income = iRes.data || [];
      expenses = eRes.data || [];
      updateUI();
    } catch(e) {
      console.error(e);
    }
  }

  function updateUI() {
    const pInc = income.filter(i => i.profile_owner === currentProfile);
    const pExp = expenses.filter(e => e.profile_owner === currentProfile);
    const mInc = pInc.filter(i => i.date && i.date.startsWith(selMonth));
    const mExp = pExp.filter(e => e.date && e.date.startsWith(selMonth));

    const tInc = mInc.reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);
    const tExp = mExp.reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);
    const net = tInc - tExp;

    document.getElementById('kpi-inc').textContent = '৳' + tInc.toLocaleString();
    document.getElementById('kpi-exp').textContent = '৳' + tExp.toLocaleString();
    document.getElementById('kpi-sav').textContent = (net >= 0 ? '৳' : '-৳') + Math.abs(net).toLocaleString();
    document.getElementById('kpi-sav').style.color = net >= 0 ? '#34d399' : '#f87171';

    // OFFICE FINANCIALS (Radone only)
    if (currentProfile === 'radone') {
      const officeInc = mInc.filter(i => 
        i.category_group && (i.category_group.includes('4R') || i.category_group.includes('Truphoto') || i.category_group.includes('Multimedia'))
      ).reduce((s, i) => s + (parseFloat(i.amount) || 0), 0);

      const officeExp = mExp.filter(e => 
        e.category && (e.category === 'office_out' || e.category === 'office_ent' || e.category === 'office_equip')
      ).reduce((s, e) => s + (parseFloat(e.amount) || 0), 0);

      const officeProfit = officeInc - officeExp;

      document.getElementById('office-income').textContent = '৳' + officeInc.toLocaleString();
      document.getElementById('office-expense').textContent = '৳' + officeExp.toLocaleString();
      document.getElementById('office-profit').textContent = (officeProfit >= 0 ? '৳' : '-৳') + Math.abs(officeProfit).toLocaleString();
    }
  }

  function openModal(type) {
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('modal-title').textContent = type === 'income' ? 'Add Income' : 'Add Expense';
    const d = new Date().toISOString().split('T')[0];

    if (type === 'income') {
      document.getElementById('form-body').innerHTML = `
        <input type="date" id="f-date" value="${d}" />
        <input type="text" id="f-source" placeholder="Source" />
        <select id="f-group">
          <option value="Personal">Personal</option>
          <option value="4R Studio">4R Studio</option>
          <option value="Truphoto Studio">Truphoto</option>
          <option value="Tru Multimedia Ltd.">Tru Multimedia</option>
        </select>
        <select id="f-wallet">
          <option>💵 Cash Hand</option>
          <option>📱 bKash</option>
          <option>🏛️ City Bank</option>
        </select>
        <input type="number" id="f-amt" placeholder="Amount" />
        <button class="btn-s" onclick="submitIncome()">Save</button>
      `;
    } else {
      document.getElementById('form-body').innerHTML = `
        <input type="date" id="f-date" value="${d}" />
        <input type="text" id="f-desc" placeholder="Description" />
        <select id="f-cat">
          <option value="office_equip">Office Equipment</option>
          <option value="office_ent">Office Entertainment</option>
          <option value="office_out">Given to Office</option>
          <option value="misc">Misc</option>
        </select>
        <select id="f-method">
          <option>💵 Cash</option>
          <option>📱 bKash</option>
          <option>🏛️ City Bank</option>
        </select>
        <input type="number" id="f-amt" placeholder="Amount" />
        <button class="btn-p" onclick="submitExpense()">Save</button>
      `;
    }
  }

  window.submitIncome = async () => {
    const { error } = await sb.from('hub_income').insert([{
      date: document.getElementById('f-date').value,
      source: document.getElementById('f-source').value,
      amount: parseFloat(document.getElementById('f-amt').value),
      notes: document.getElementById('f-wallet').value,
      category_group: document.getElementById('f-group').value,
      profile_owner: currentProfile
    }]);
    if (!error) { document.getElementById('modal').style.display = 'none'; loadData(); } else { alert('Error: ' + error.message); }
  };

  window.submitExpense = async () => {
    const { error } = await sb.from('hub_expenses').insert([{
      date: document.getElementById('f-date').value,
      description: document.getElementById('f-desc').value,
      amount: parseFloat(document.getElementById('f-amt').value),
      category: document.getElementById('f-cat').value,
      payment_method: document.getElementById('f-method').value,
      profile_owner: currentProfile
    }]);
    if (!error) { document.getElementById('modal').style.display = 'none'; loadData(); } else { alert('Error: ' + error.message); }
  };
})();
</script>
</body>
</html>
